
pool:
  name: 'Self hosted Pool'

trigger:
  branches:
    include:
      - develop
      - devops

variables:
  ACR_NAME: 'prazgcontreg1ai'
  ACR_LOGIN_SERVER: 'prazgcontreg1ai-h6aghneweuc7d4gf.azurecr.io'
  DOCKER_REPOSITORY: 'skillforge-backend'
  AZURE_FEED_NAME: 'studi-ai'
  IMAGE_TAG: '$(Build.BuildId)'
  BRANCH_NAME: $[replace(variables['Build.SourceBranch'], 'refs/heads/', '')]
  SERVICE_CONNECTION: 'connection2'   # Azure service connection name for ACR link

stages:
- stage: Prepare
  displayName: 'Prepare & Build Image'
  jobs:
  - job: BuildAndPush
    displayName: 'Build and Push Docker Image'
    steps:

      # ------------------------------------------
      # Check Environment
      # ------------------------------------------
      - script: |
          echo "Branch: $(Build.SourceBranch)"
          echo "Commit: $(Build.SourceVersion)"
          echo "ACR: $(ACR_LOGIN_SERVER)"
        displayName: 'Display Build Context'

      # ------------------------------------------
      # Login to ACR using Azure CLI token
      # ------------------------------------------
      - task: AzureCLI@2
        displayName: 'Authenticate to Azure Container Registry'
        inputs:
          azureSubscription: '$(SERVICE_CONNECTION)'
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "Logging into ACR $(ACR_NAME)..."
            TOKEN=$(az acr login --name $(ACR_NAME) --expose-token --query accessToken -o tsv)
            echo $TOKEN | docker login $(ACR_LOGIN_SERVER) --username 00000000-0000-0000-0000-000000000000 --password-stdin

      # ------------------------------------------
      # Build & Push Docker Image
      # ------------------------------------------
      - task: Docker@2
        displayName: 'Build Docker image'
        inputs:
          command: build
          repository: '$(ACR_LOGIN_SERVER)/$(DOCKER_REPOSITORY)'
          dockerfile: 'docker/Dockerfile'
          buildContext: '.'
          arguments: >
            --build-arg AZURE_FEED_TOKEN=$(System.AccessToken)
            --build-arg AZURE_FEED_NAME=$(AZURE_FEED_NAME)
          tags: |
            $(IMAGE_TAG)
            $(BRANCH_NAME)
            latest

      - task: Docker@2
        displayName: 'Push Docker image to ACR'
        inputs:
          command: push
          repository: '$(ACR_LOGIN_SERVER)/$(DOCKER_REPOSITORY)'
          tags: |
            $(IMAGE_TAG)
            $(BRANCH_NAME)
            latest

      # ------------------------------------------
      # Output Info
      # ------------------------------------------
      - script: |
          echo "✅ Docker image pushed:"
          echo "   $(ACR_LOGIN_SERVER)/$(DOCKER_REPOSITORY):$(IMAGE_TAG)"
          echo "   $(ACR_LOGIN_SERVER)/$(DOCKER_REPOSITORY):$(BRANCH_NAME)"
          echo "   $(ACR_LOGIN_SERVER)/$(DOCKER_REPOSITORY):latest"
        displayName: 'Show Image Info'
