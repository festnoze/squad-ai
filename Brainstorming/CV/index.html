<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV – Etienne Millerioux</title>

  <!-- Icônes Font Awesome — requiert une connexion internet -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link rel="stylesheet" href="cv.css">

  <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  DONNÉES — éditez uniquement ces fichiers pour mettre   ║
    ║  à jour le contenu du CV.                               ║
    ╚══════════════════════════════════════════════════════════╝
  -->
  <script src="data/name.js"></script>
  <script src="data/contact.js"></script>
  <script src="data/summary.js"></script>
  <script src="data/skills.js"></script>
  <script src="data/experience.js"></script>
  <script src="data/education.js"></script>
  <script src="data/languages.js"></script>
  <script src="data/sidebar_skills.js"></script>
</head>

<body>
  <div class="cv-page">

    <!-- ══════════════════════════════════════════════════════
         CELLULE 1 — top-left  : Nom
         ══════════════════════════════════════════════════════ -->
    <div class="cell-nom">
      <h1 id="cv-name"></h1>
    </div>

    <!-- ══════════════════════════════════════════════════════
         CELLULE 2 — top-right : Titre / poste visé + Photo
         ══════════════════════════════════════════════════════ -->
    <div class="cell-titre">
      <div class="cv-title-block">
        <p class="cv-main-title" id="cv-main-title"></p>
        <p class="cv-sub-title"  id="cv-sub-title"></p>
      </div>
    </div>

    <!-- Photo flottante (chevauchement titre / compétences) -->
    <img src="photo.jpg" alt="Photo Etienne Millerioux" class="cv-photo">

    <!-- ══════════════════════════════════════════════════════
         CELLULE 3 — left (row2) : Contact
         ══════════════════════════════════════════════════════ -->
    <div class="cell-contact">
      <div id="cv-contact"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         CELLULE 3b — left (row3) : Outils + Langues
         ══════════════════════════════════════════════════════ -->
    <div class="cell-sidebar-tools">
      <div>
        <h2 class="section-title section-title-left">Stack</h2>
        <div id="cv-sidebar-skills"></div>
      </div>

      <div>
        <h2 class="section-title section-title-left">Langues</h2>
        <div id="cv-languages"></div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         CELLULE 4 — right (row2) : Compétences
         ══════════════════════════════════════════════════════ -->
    <div class="cell-skills">
      <h2 class="section-title">Compétences</h2>
      <ul id="cv-skills"></ul>
    </div>

    <!-- ══════════════════════════════════════════════════════
         CELLULE 5 — pleine largeur (row3) : Expériences
         ══════════════════════════════════════════════════════ -->
    <div class="cell-experience">
      <h2 class="section-title">Expériences</h2>
      <div id="cv-experience"></div>

      <h2 class="section-title" style="margin-top: 20px;">Formation</h2>
      <div id="cv-education"></div>
    </div>

  </div><!-- /.cv-page -->

  <script>
    // ── Utilitaire : échappe les caractères HTML ──────────────────────────
    function esc(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ── Nom ───────────────────────────────────────────────────────────────
    document.getElementById('cv-name').textContent = NAME.firstName + ' ' + NAME.lastName;

    // ── Titre / poste visé (cellule 2) ────────────────────────────────────
    document.getElementById('cv-main-title').textContent = SUMMARY.main;
    document.getElementById('cv-sub-title').textContent  = SUMMARY.sub;

    // ── Contact (cellule 3) ───────────────────────────────────────────────
    const contactEl = document.getElementById('cv-contact');
    CONTACT.items.forEach(item => {
      const div  = document.createElement('div');
      div.className = 'contact-item';
      const icon = document.createElement('i');
      icon.className = item.icon;
      div.appendChild(icon);
      const span = document.createElement('span');
      if (item.href) {
        const a = document.createElement('a');
        a.href      = item.href;
        a.innerHTML = item.value;
        span.appendChild(a);
      } else {
        span.innerHTML = item.value;
      }
      div.appendChild(span);
      contactEl.appendChild(div);
    });

    // ── Compétences ───────────────────────────────────────────────────────
    const skillsEl = document.getElementById('cv-skills');
    SKILLS.forEach(skill => {
      const li = document.createElement('li');
      if (skill.group) {
        li.className = 'skills-group';
        li.innerHTML = skill.group;
      } else {
        li.innerHTML = `<span class="skill-title">${skill.title}</span> : ${skill.desc}.`;
      }
      skillsEl.appendChild(li);
    });

    // ── Expériences ───────────────────────────────────────────────────────
    const expEl = document.getElementById('cv-experience');
    EXPERIENCE.forEach(group => {
      const groupDiv = document.createElement('div');
      groupDiv.className = 'exp-group';

      const companyDiv = document.createElement('div');
      companyDiv.className = 'exp-company-header';
      companyDiv.textContent = group.company;
      groupDiv.appendChild(companyDiv);

      group.positions.forEach((role, i) => {
        const roleDiv = document.createElement('div');
        roleDiv.className = 'exp-role' + (i === group.positions.length - 1 ? ' exp-role-last' : '');
        roleDiv.innerHTML = `
          <div class="exp-dates">${esc(role.period)}</div>
          <div class="exp-header">
            <span class="exp-title-inline">${role.title}</span>
          </div>
          ${role.description
            ? `<div class="exp-description">${role.description}</div>`
            : ''}
          ${role.techs
            ? `<div class="exp-techs"><span class="exp-techs-label">Stack : </span>${esc(role.techs)}</div>`
            : ''}
        `;
        groupDiv.appendChild(roleDiv);
      });

      expEl.appendChild(groupDiv);
    });

    // ── Formation ─────────────────────────────────────────────────────────
    const eduEl = document.getElementById('cv-education');
    EDUCATION.forEach(edu => {
      const div = document.createElement('div');
      div.className = 'edu-item';
      div.innerHTML = `
        <span class="edu-degree">${edu.degree}</span>
        <span class="edu-sep">&nbsp;—&nbsp;</span>
        <span class="edu-dates">${esc(edu.period)}</span>
        ${edu.school ? `<span class="edu-school">&nbsp;(${esc(edu.school)})</span>` : ''}
      `;
      eduEl.appendChild(div);
    });

    // ── Skills sidebar ────────────────────────────────────────────────────
    const sideSkillsEl = document.getElementById('cv-sidebar-skills');
    TOOLS.forEach(item => {
      const div = document.createElement('div');
      div.className = 'sidebar-skill-item';
      div.innerHTML = `
        <span class="sidebar-skill-label">${item.label}</span>
        <span class="sidebar-skill-tags">${item.tags}</span>
      `;
      sideSkillsEl.appendChild(div);
    });

    // ── Langues ───────────────────────────────────────────────────────────
    const langEl = document.getElementById('cv-languages');
    LANGUAGES.forEach(lang => {
      const div = document.createElement('div');
      div.className = 'lang-item';
      div.innerHTML = `
        <span class="lang-name">${esc(lang.name)}</span>
        <span class="lang-level">${esc(lang.level)}</span>
      `;
      langEl.appendChild(div);
    });
  </script>
</body>
</html>
