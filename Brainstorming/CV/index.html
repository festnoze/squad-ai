<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV – Etienne Millerioux</title>

  <!-- Icônes Font Awesome — requiert une connexion internet -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link rel="stylesheet" href="cv.css">

  <!--
    ╔══════════════════════════════════════════════════════════╗
    ║  DONNÉES — éditez uniquement ces fichiers pour mettre   ║
    ║  à jour le contenu du CV. Chaque fichier exporte une   ║
    ║  constante JS globale utilisée par le template.         ║
    ╚══════════════════════════════════════════════════════════╝
  -->
  <script src="data/contact.js"></script>
  <script src="data/summary.js"></script>
  <script src="data/skills.js"></script>
  <script src="data/experience.js"></script>
  <script src="data/education.js"></script>
  <script src="data/languages.js"></script>
</head>

<body>
  <div class="cv-page">

    <!-- ══════════════════════════════════════════════════════
         CELLULE 1 — top-left  : Identité & contact
         ══════════════════════════════════════════════════════ -->
    <div class="cell-identity">
      <div class="name-block">
        <h1 id="cv-name"></h1>
        <p  id="cv-title" class="job-title"></p>
      </div>
      <div class="cell-divider"></div>
      <div id="cv-contact"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         CELLULE 2 — top-right : Synthèse professionnelle
         ══════════════════════════════════════════════════════ -->
    <div class="cell-summary">
      <h2 class="section-title">Synthèse professionnelle</h2>
      <p id="cv-summary"></p>
    </div>

    <!-- ══════════════════════════════════════════════════════
         CELLULE 3 — bottom-left : Compétences / Formation / Langues
         ══════════════════════════════════════════════════════ -->
    <div class="cell-sidebar">

      <div>
        <h2 class="section-title">Compétences</h2>
        <ul id="cv-skills"></ul>
      </div>

      <div>
        <h2 class="section-title">Formation</h2>
        <div id="cv-education"></div>
      </div>

      <div>
        <h2 class="section-title">Langues</h2>
        <div id="cv-languages"></div>
      </div>

    </div>

    <!-- ══════════════════════════════════════════════════════
         CELLULE 4 — bottom-right : Expérience
         ══════════════════════════════════════════════════════ -->
    <div class="cell-experience">
      <h2 class="section-title">Expérience</h2>
      <div id="cv-experience"></div>
    </div>

  </div><!-- /.cv-page -->

  <script>
    // ── Utilitaire : échappe les caractères HTML pour le texte brut ──────
    function esc(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ── Nom & titre ───────────────────────────────────────────────────────
    document.getElementById('cv-name').textContent  = CONTACT.name;
    document.getElementById('cv-title').textContent = CONTACT.jobTitle;

    // ── Contact ───────────────────────────────────────────────────────────
    const contactEl = document.getElementById('cv-contact');
    CONTACT.items.forEach(item => {
      const div  = document.createElement('div');
      div.className = 'contact-item';

      const icon = document.createElement('i');
      icon.className = item.icon;
      div.appendChild(icon);

      const span = document.createElement('span');
      if (item.href) {
        const a = document.createElement('a');
        a.href    = item.href;
        a.innerHTML = item.value;   // innerHTML pour autoriser <br>
        span.appendChild(a);
      } else {
        span.innerHTML = item.value;
      }
      div.appendChild(span);
      contactEl.appendChild(div);
    });

    // ── Synthèse (innerHTML : accepte du HTML dans summary.js) ───────────
    document.getElementById('cv-summary').innerHTML = SUMMARY;

    // ── Compétences ───────────────────────────────────────────────────────
    const skillsEl = document.getElementById('cv-skills');
    SKILLS.forEach(skill => {
      const li = document.createElement('li');
      li.innerHTML = skill;
      skillsEl.appendChild(li);
    });

    // ── Expériences ───────────────────────────────────────────────────────
    const expEl = document.getElementById('cv-experience');
    EXPERIENCE.forEach(job => {
      const div = document.createElement('div');
      div.className = 'exp-item';
      div.innerHTML = `
        <div class="exp-header">
          <span class="exp-company">${esc(job.company)}</span>
          – <span class="exp-title-inline">${job.title}</span>
        </div>
        <div class="exp-dates">${esc(job.period)}</div>
        ${job.description
          ? `<div class="exp-description">${job.description}</div>`
          : ''}
        ${job.techs
          ? `<div class="exp-techs"><span class="exp-techs-label"># </span>${esc(job.techs)}</div>`
          : ''}
      `;
      expEl.appendChild(div);
    });

    // ── Formation ─────────────────────────────────────────────────────────
    const eduEl = document.getElementById('cv-education');
    EDUCATION.forEach(edu => {
      const div = document.createElement('div');
      div.className = 'edu-item';
      div.innerHTML = `
        ${edu.school ? `<div class="edu-school">${esc(edu.school)}</div>` : ''}
        <div class="edu-dates">${esc(edu.period)}</div>
        <div class="edu-degree">${edu.degree}</div>
      `;
      eduEl.appendChild(div);
    });

    // ── Langues ───────────────────────────────────────────────────────────
    const langEl = document.getElementById('cv-languages');
    LANGUAGES.forEach(lang => {
      const div = document.createElement('div');
      div.className = 'lang-item';
      div.innerHTML = `
        <span class="lang-name">${esc(lang.name)}</span>
        <span class="lang-level">${esc(lang.level)}</span>
      `;
      langEl.appendChild(div);
    });
  </script>
</body>
</html>
