<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV – Etienne Millerioux</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link rel="stylesheet" href="cv2.css">

  <script src="data/name.js"></script>
  <script src="data/contact.js"></script>
  <script src="data/summary.js"></script>
  <script src="data/skills.js"></script>
  <script src="data/experience.js"></script>
  <script src="data/education.js"></script>
  <script src="data/languages.js"></script>
  <script src="data/sidebar_skills.js"></script>
</head>

<body>
  <div class="cv-page">

    <!-- ══════════════════════════════════════════════════════
         COLONNE GAUCHE
         ══════════════════════════════════════════════════════ -->
    <div class="col-left">

      <!-- Identité -->
      <div class="left-header">
        <h1>
          <span id="cv-firstname"></span>
          <span id="cv-lastname"></span>
        </h1>
      </div>

      <!-- Contact -->
      <div class="left-section">
        <h2 class="left-section-title">Contact</h2>
        <div id="cv-contact"></div>
      </div>

      <!-- Outils -->
      <div class="left-section">
        <h2 class="left-section-title">Outils</h2>
        <div id="cv-sidebar-skills"></div>
      </div>

      <!-- Langues -->
      <div class="left-section">
        <h2 class="left-section-title">Langues</h2>
        <div id="cv-languages"></div>
      </div>

      <!-- Formation -->
      <div class="left-section">
        <h2 class="left-section-title">Formation</h2>
        <div id="cv-education"></div>
      </div>

    </div><!-- /.col-left -->

    <!-- ══════════════════════════════════════════════════════
         COLONNE DROITE
         ══════════════════════════════════════════════════════ -->
    <div class="col-right">

      <!-- Titre / poste visé -->
      <div class="right-header">
        <p class="cv-main-title" id="cv-main-title"></p>
        <p class="cv-sub-title"  id="cv-sub-title"></p>
      </div>

      <!-- Compétences -->
      <div class="right-section">
        <h2 class="right-section-title">Compétences</h2>
        <ul class="skills-list" id="cv-skills"></ul>
      </div>

      <!-- Expériences -->
      <div class="right-section">
        <h2 class="right-section-title">Expérience professionnelle</h2>
        <div id="cv-experience"></div>
      </div>

    </div><!-- /.col-right -->

  </div><!-- /.cv-page -->

  <script>
    function esc(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ── Identité
    document.getElementById('cv-firstname').textContent = NAME.firstName;
    document.getElementById('cv-lastname').textContent  = NAME.lastName;

    // ── Titre
    document.getElementById('cv-main-title').textContent = SUMMARY.main;
    document.getElementById('cv-sub-title').textContent  = SUMMARY.sub;

    // ── Contact
    const contactEl = document.getElementById('cv-contact');
    CONTACT.items.forEach(item => {
      const div  = document.createElement('div');
      div.className = 'contact-item';
      const icon = document.createElement('i');
      icon.className = item.icon;
      div.appendChild(icon);
      const span = document.createElement('span');
      if (item.href) {
        const a = document.createElement('a');
        a.href      = item.href;
        a.innerHTML = item.value;
        span.appendChild(a);
      } else {
        span.innerHTML = item.value;
      }
      div.appendChild(span);
      contactEl.appendChild(div);
    });

    // ── Outils
    const sideSkillsEl = document.getElementById('cv-sidebar-skills');
    TOOLS.forEach(item => {
      const div = document.createElement('div');
      div.className = 'tool-item';
      div.innerHTML = `
        <div class="tool-label">${item.label}</div>
        <div class="tool-tags">${item.tags}</div>
      `;
      sideSkillsEl.appendChild(div);
    });

    // ── Langues
    const langEl = document.getElementById('cv-languages');
    LANGUAGES.forEach(lang => {
      const div = document.createElement('div');
      div.className = 'lang-item';
      div.innerHTML = `
        <span class="lang-name">${esc(lang.name)}</span>
        <span class="lang-level">${esc(lang.level)}</span>
      `;
      langEl.appendChild(div);
    });

    // ── Formation
    const eduEl = document.getElementById('cv-education');
    EDUCATION.forEach(edu => {
      const div = document.createElement('div');
      div.className = 'edu-item';
      div.innerHTML = `
        <div class="edu-degree">${edu.degree}</div>
        <div class="edu-dates">${esc(edu.period)}${edu.school ? ' — ' + esc(edu.school) : ''}</div>
      `;
      eduEl.appendChild(div);
    });

    // ── Compétences
    const skillsEl = document.getElementById('cv-skills');
    SKILLS.forEach(skill => {
      const li = document.createElement('li');
      if (skill && typeof skill === 'object' && skill.group) {
        li.className = 'skills-group-title';
        li.innerHTML = skill.group;
      } else {
        li.innerHTML = skill + '.';
      }
      skillsEl.appendChild(li);
    });

    // ── Expériences
    const expEl = document.getElementById('cv-experience');
    EXPERIENCE.forEach(group => {
      const groupDiv = document.createElement('div');
      groupDiv.className = 'exp-group';

      const companyDiv = document.createElement('div');
      companyDiv.className = 'exp-company-header';
      companyDiv.textContent = group.company;
      groupDiv.appendChild(companyDiv);

      group.roles.forEach((role, i) => {
        const roleDiv = document.createElement('div');
        roleDiv.className = 'exp-role' + (i === group.roles.length - 1 ? ' exp-role-last' : '');
        roleDiv.innerHTML = `
          <div class="exp-title">${role.title}</div>
          <div class="exp-dates">${esc(role.period)}</div>
          ${role.description ? `<div class="exp-description">${role.description}</div>` : ''}
          ${role.techs ? `<div class="exp-techs"><span class="exp-techs-label">Stack : </span>${esc(role.techs)}</div>` : ''}
        `;
        groupDiv.appendChild(roleDiv);
      });

      expEl.appendChild(groupDiv);
    });
  </script>
</body>
</html>
