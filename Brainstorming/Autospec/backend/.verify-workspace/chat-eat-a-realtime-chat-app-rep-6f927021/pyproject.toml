[project]
name = "chat_eat_a_realtime_chat_app_rep"
version = "0.1.0"
description = "Generated by Autospec: chat-eat-a-realtime-chat-app-rep"
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-bdd>=7.0",
    "pytest-json-report>=1.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["chat_eat_a_realtime_chat_app_rep"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m \"not ui\""
markers = ["ui: tests d'acceptance UI Playwright (rejoues via `uv run pytest -m ui`)"]
