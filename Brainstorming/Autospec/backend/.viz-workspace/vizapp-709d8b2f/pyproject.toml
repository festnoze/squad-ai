[project]
name = "vizapp"
version = "0.1.0"
description = "Generated by Autospec: VizApp"
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-bdd>=7.0",
    "pytest-json-report>=1.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vizapp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m \"not ui\""
markers = ["ui: tests d'acceptance UI Playwright (rejoues via `uv run pytest -m ui`)"]
