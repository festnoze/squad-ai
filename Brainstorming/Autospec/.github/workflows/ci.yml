# ---------------------------------------------------------------------------
# Autospec CI
#
# IMPORTANT — contrainte monorepo :
# Ce workflow est ecrit comme si Autospec etait la RACINE de son propre depot
# (chemins relatifs `backend/` et `frontend/`). Or, aujourd'hui Autospec vit
# DANS le monorepo `squad-ai`, qui possede deja son propre `.github` a la racine.
# GitHub Actions ne declenche QUE les workflows situes a `<repo-root>/.github/
# workflows/`. Tant qu'Autospec reste dans le monorepo, ce fichier NE sera PAS
# execute ici : il faut soit le DEPLACER a la racine du depot (en prefixant les
# chemins par `Brainstorming/Autospec/`), soit EXTRAIRE Autospec dans son propre
# depot (auquel cas ce fichier fonctionne tel quel, sans modification).
# ---------------------------------------------------------------------------

name: CI

on: [push, pull_request]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run pytest
        run: uv run pytest -q

  frontend:
    name: Frontend (build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests (Vitest)
        run: npm run test:unit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # The Playwright config starts the backend itself via
      # backend/.venv/bin/python, so the backend venv must exist on disk.
      - name: Install backend dependencies (creates .venv)
        working-directory: backend
        run: uv sync --extra dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: frontend
        run: npm run test:e2e
