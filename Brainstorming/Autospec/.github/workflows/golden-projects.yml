# ---------------------------------------------------------------------------
# Autospec Golden Projects
#
# Same monorepo caveat as ci.yml: this file only runs automatically when
# Autospec is at the repository root, or after copying it to the monorepo root
# with paths adjusted. It is still kept here as the source-of-truth workflow for
# an extracted Autospec repo.
# ---------------------------------------------------------------------------

name: Golden Projects

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  deterministic-golden:
    name: Deterministic golden battery
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --extra dev

      - name: Run deterministic golden backend tests
        run: |
          uv run pytest -q \
            tests/test_e2e_feature_factory.py \
            tests/test_smoke_run.py \
            tests/test_runtime_acceptance.py \
            tests/test_delivery_gate.py \
            tests/test_profiles.py \
            tests/test_skills.py \
            tests/test_streams.py \
            tests/test_streams_build.py \
            tests/test_frontend_toolchain.py

  frontend-contracts:
    name: Frontend contract checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run contract-focused unit tests
        run: npm run test:unit -- --run src/work.test.ts src/api.test.ts src/components/RunPanel.test.tsx
