# Trading Agents Configuration

data:
  provider: yfinance
  default_symbols:
    - AAPL
    - MSFT
    - EURUSD=X
    - ^STOXX50E  # Euro Stoxx 50
  default_period: 5y
  default_interval: 1d
  cache_dir: ../results/data_cache

backtesting:
  engine: vectorbt
  initial_capital: 10000
  commission_pct: 0.001  # 0.1%
  slippage_pct: 0.0005   # 0.05%

evaluation:
  min_sharpe_ratio: 1.0
  max_drawdown_pct: 0.20      # 20%
  min_trades: 30
  walk_forward_splits: 5

agent:
  model: claude-sonnet-4-6
  max_iterations: 20
  strategies_per_iteration: 3
  temperature: 0.7

broker:
  provider: interactive_brokers
  host: 127.0.0.1
  port: 7497          # TWS paper trading port (7496 for live)
  client_id: 1
  account_type: paper  # paper | live
