<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Forge - Quiz ADK</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --error: #f85149;
      --warning: #d29922;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 2rem;
    }
    .container { max-width: 760px; margin: 0 auto; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); margin-bottom: 2rem; }

    /* Step selector */
    .step-nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
    .step-btn {
      padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px;
      background: var(--surface); color: var(--muted); cursor: pointer;
      font-size: 0.85rem; transition: all 0.2s;
    }
    .step-btn:hover { border-color: var(--accent); color: var(--text); }
    .step-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .step-btn.completed { border-color: var(--success); }
    .step-btn.completed::after { content: " \2713"; color: var(--success); }

    /* Quiz area */
    .quiz-header { margin-bottom: 1.5rem; }
    .quiz-header h2 { font-size: 1.3rem; }
    .progress-bar {
      height: 4px; background: var(--border); border-radius: 2px;
      margin-top: 0.75rem; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Question */
    .question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem;
    }
    .question-number { color: var(--accent); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.05rem; margin-bottom: 1.25rem; line-height: 1.5; }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 0.5rem; }
    .option {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; transition: all 0.2s; background: transparent;
      color: var(--text); font-size: 0.95rem; text-align: left; width: 100%;
    }
    .option:hover:not(.disabled) { border-color: var(--accent); background: rgba(88,166,255,0.05); }
    .option .letter {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border); display: flex; align-items: center;
      justify-content: center; font-size: 0.8rem; font-weight: 600;
      flex-shrink: 0; transition: all 0.2s;
    }
    .option.selected { border-color: var(--accent); }
    .option.selected .letter { background: var(--accent); color: #fff; border-color: var(--accent); }
    .option.correct { border-color: var(--success); background: rgba(63,185,80,0.08); }
    .option.correct .letter { background: var(--success); color: #fff; border-color: var(--success); }
    .option.wrong { border-color: var(--error); background: rgba(248,81,73,0.08); }
    .option.wrong .letter { background: var(--error); color: #fff; border-color: var(--error); }
    .option.disabled { cursor: default; opacity: 0.7; }
    .option.disabled.correct { opacity: 1; }

    /* Explanation */
    .explanation {
      margin-top: 1rem; padding: 1rem; border-radius: 6px;
      border-left: 3px solid var(--accent); background: rgba(88,166,255,0.05);
      font-size: 0.9rem; line-height: 1.5; display: none;
    }
    .explanation.visible { display: block; }

    /* Buttons */
    .btn-row { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; }
    .btn {
      padding: 0.6rem 1.5rem; border-radius: 6px; font-size: 0.9rem;
      cursor: pointer; border: 1px solid var(--border); transition: all 0.2s;
      font-weight: 500;
    }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.5; cursor: default; filter: none; }
    .btn-secondary { background: transparent; color: var(--text); }
    .btn-secondary:hover { background: var(--surface); }

    /* Results */
    .results-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 2rem; text-align: center;
    }
    .score-circle {
      width: 120px; height: 120px; border-radius: 50%; margin: 1rem auto;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; border: 4px solid;
    }
    .score-circle.excellent { border-color: var(--success); color: var(--success); }
    .score-circle.good { border-color: var(--accent); color: var(--accent); }
    .score-circle.needs-work { border-color: var(--warning); color: var(--warning); }
    .score-circle.poor { border-color: var(--error); color: var(--error); }
    .score-label { font-size: 1.2rem; margin: 0.5rem 0; font-weight: 600; }
    .score-detail { color: var(--muted); margin-bottom: 1.5rem; }

    /* Summary table */
    .summary { width: 100%; text-align: left; border-collapse: collapse; margin: 1rem 0; }
    .summary th { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; padding: 0.5rem; border-bottom: 1px solid var(--border); }
    .summary td { padding: 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .summary .icon-ok { color: var(--success); }
    .summary .icon-ko { color: var(--error); }

    /* Global scores */
    .global-scores {
      margin-top: 2rem; padding: 1.5rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    }
    .global-scores h3 { margin-bottom: 1rem; }
    .step-score-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.4rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .step-score-row:last-child { border-bottom: none; }
    .step-score-bar {
      width: 100px; height: 6px; background: var(--border);
      border-radius: 3px; overflow: hidden; margin-left: 0.5rem;
    }
    .step-score-fill { height: 100%; border-radius: 3px; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Code Forge <span>Quiz</span></h1>
    <p class="subtitle">Teste tes connaissances ADK apres chaque etape du tutorial</p>

    <div class="step-nav" id="stepNav"></div>

    <div id="quizArea" class="hidden">
      <div class="quiz-header">
        <h2 id="quizTitle"></h2>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div id="questionArea"></div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btnPrev" onclick="prevQuestion()">Precedent</button>
        <button class="btn btn-primary" id="btnNext" onclick="nextQuestion()">Suivant</button>
      </div>
    </div>

    <div id="resultsArea" class="hidden"></div>

    <div class="global-scores" id="globalScores">
      <h3>Progression globale</h3>
      <div id="globalScoresBody"></div>
    </div>
  </div>

  <script src="quiz_data.js"></script>
  <script>
    let currentStep = null;
    let currentQ = 0;
    let answers = {};
    let allScores = JSON.parse(localStorage.getItem('adk_quiz_scores') || '{}');

    function init() {
      const nav = document.getElementById('stepNav');
      nav.innerHTML = '';
      Object.keys(quizData).forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'step-btn' + (allScores[key] !== undefined ? ' completed' : '');
        btn.textContent = key.replace('step_0', 'Step ').replace('step_', 'Step ');
        btn.onclick = () => startQuiz(key);
        nav.appendChild(btn);
      });
      updateGlobalScores();
    }

    function startQuiz(stepKey) {
      currentStep = stepKey;
      currentQ = 0;
      answers = {};
      document.getElementById('quizArea').classList.remove('hidden');
      document.getElementById('resultsArea').classList.add('hidden');
      document.getElementById('quizTitle').textContent = quizData[stepKey].title;

      document.querySelectorAll('.step-btn').forEach((btn, i) => {
        btn.classList.toggle('active', Object.keys(quizData)[i] === stepKey);
      });

      renderQuestion();
    }

    function renderQuestion() {
      const quiz = quizData[currentStep];
      const q = quiz.questions[currentQ];
      const total = quiz.questions.length;
      const answered = answers[currentQ] !== undefined;

      document.getElementById('progressFill').style.width = ((currentQ + 1) / total * 100) + '%';

      const letters = ['A', 'B', 'C', 'D'];
      let html = `
        <div class="question-card">
          <div class="question-number">Question ${currentQ + 1} / ${total}</div>
          <div class="question-text">${q.question}</div>
          <div class="options">
            ${q.options.map((opt, i) => {
              let cls = 'option';
              if (answered) {
                cls += ' disabled';
                if (i === q.correct) cls += ' correct';
                else if (i === answers[currentQ] && i !== q.correct) cls += ' wrong';
              } else if (answers[currentQ] === i) {
                cls += ' selected';
              }
              return `<button class="${cls}" onclick="selectAnswer(${i})" ${answered ? 'disabled' : ''}>
                <span class="letter">${letters[i]}</span>
                <span>${opt}</span>
              </button>`;
            }).join('')}
          </div>
          <div class="explanation ${answered ? 'visible' : ''}">${q.explanation}</div>
        </div>
      `;
      document.getElementById('questionArea').innerHTML = html;

      document.getElementById('btnPrev').style.visibility = currentQ > 0 ? 'visible' : 'hidden';
      const btnNext = document.getElementById('btnNext');
      if (currentQ === total - 1 && answered) {
        btnNext.textContent = 'Voir les resultats';
        btnNext.disabled = false;
      } else {
        btnNext.textContent = 'Suivant';
        btnNext.disabled = !answered;
      }
    }

    function selectAnswer(idx) {
      if (answers[currentQ] !== undefined) return;
      answers[currentQ] = idx;
      renderQuestion();
    }

    function nextQuestion() {
      const quiz = quizData[currentStep];
      if (currentQ === quiz.questions.length - 1) {
        showResults();
      } else {
        currentQ++;
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (currentQ > 0) { currentQ--; renderQuestion(); }
    }

    function showResults() {
      const quiz = quizData[currentStep];
      let correct = 0;
      quiz.questions.forEach((q, i) => { if (answers[i] === q.correct) correct++; });
      const total = quiz.questions.length;
      const pct = Math.round(correct / total * 100);

      allScores[currentStep] = { correct, total, pct, date: new Date().toISOString().split('T')[0] };
      localStorage.setItem('adk_quiz_scores', JSON.stringify(allScores));

      let grade, cls, msg;
      if (pct >= 90) { grade = 'Excellent !'; cls = 'excellent'; msg = 'Tu maitrises parfaitement ce concept.'; }
      else if (pct >= 70) { grade = 'Bien !'; cls = 'good'; msg = 'Bonne comprehension, quelques details a revoir.'; }
      else if (pct >= 50) { grade = 'A revoir'; cls = 'needs-work'; msg = 'Relis le TUTORIAL.md et reessaie.'; }
      else { grade = 'A approfondir'; cls = 'poor'; msg = 'Reprends le step depuis le debut.'; }

      let summaryRows = quiz.questions.map((q, i) => {
        const ok = answers[i] === q.correct;
        const letters = ['A','B','C','D'];
        return `<tr>
          <td><span class="${ok ? 'icon-ok' : 'icon-ko'}">${ok ? '\u2713' : '\u2717'}</span></td>
          <td>Q${i+1}: ${q.question.substring(0, 60)}${q.question.length > 60 ? '...' : ''}</td>
          <td>${ok ? 'Correct' : 'Repondu ' + letters[answers[i]] + ', correct: ' + letters[q.correct]}</td>
        </tr>`;
      }).join('');

      document.getElementById('quizArea').classList.add('hidden');
      const results = document.getElementById('resultsArea');
      results.classList.remove('hidden');
      results.innerHTML = `
        <div class="results-card">
          <h2>${quiz.title}</h2>
          <div class="score-circle ${cls}">${pct}%</div>
          <div class="score-label">${grade}</div>
          <div class="score-detail">${correct}/${total} reponses correctes - ${msg}</div>
          <table class="summary">
            <thead><tr><th></th><th>Question</th><th>Resultat</th></tr></thead>
            <tbody>${summaryRows}</tbody>
          </table>
          <div class="btn-row" style="justify-content: center;">
            <button class="btn btn-secondary" onclick="startQuiz('${currentStep}')">Refaire ce quiz</button>
            ${getNextStep() ? `<button class="btn btn-primary" onclick="startQuiz('${getNextStep()}')">Step suivant</button>` : ''}
          </div>
        </div>
      `;

      init();
    }

    function getNextStep() {
      const keys = Object.keys(quizData);
      const idx = keys.indexOf(currentStep);
      return idx < keys.length - 1 ? keys[idx + 1] : null;
    }

    function updateGlobalScores() {
      const body = document.getElementById('globalScoresBody');
      const keys = Object.keys(quizData);
      body.innerHTML = keys.map(key => {
        const score = allScores[key];
        if (!score) {
          return `<div class="step-score-row">
            <span>${quizData[key].title}</span>
            <span style="color: var(--muted)">Pas encore fait</span>
          </div>`;
        }
        let color = score.pct >= 90 ? 'var(--success)' : score.pct >= 70 ? 'var(--accent)' : score.pct >= 50 ? 'var(--warning)' : 'var(--error)';
        return `<div class="step-score-row">
          <span>${quizData[key].title}</span>
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <span style="color:${color};font-weight:600;">${score.pct}%</span>
            <div class="step-score-bar"><div class="step-score-fill" style="width:${score.pct}%;background:${color};"></div></div>
          </div>
        </div>`;
      }).join('');
    }

    init();
  </script>
</body>
</html>
