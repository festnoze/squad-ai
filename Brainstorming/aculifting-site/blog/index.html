<script>
(function() {
    var months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

    function formatDate(dateStr) {
        var parts = dateStr.split('-');
        return parseInt(parts[2]) + ' ' + months[parseInt(parts[1])-1] + ' ' + parts[0];
    }

    // Extract unique categories
    var categories = [];
    BLOG_ARTICLES.forEach(function(a) {
        if (categories.indexOf(a.category) === -1) categories.push(a.category);
    });

    // Render filter tabs
    var tabsEl = document.getElementById('filterTabs');
    var allTab = document.createElement('button');
    allTab.textContent = 'Tous';
    allTab.className = 'article-card-category';
    allTab.style.cssText = 'cursor:pointer;border:none;padding:0.3rem 1rem;font-size:0.8rem;background:var(--color-primary);color:var(--color-white);';
    allTab.onclick = function() { renderCards('all'); setActiveTab(this); };
    tabsEl.appendChild(allTab);

    categories.forEach(function(cat) {
        var btn = document.createElement('button');
        btn.textContent = cat;
        btn.className = 'article-card-category';
        btn.style.cssText = 'cursor:pointer;border:none;padding:0.3rem 1rem;font-size:0.8rem;';
        btn.onclick = function() { renderCards(cat); setActiveTab(this); };
        tabsEl.appendChild(btn);
    });

    function setActiveTab(activeBtn) {
        var btns = tabsEl.querySelectorAll('button');
        btns.forEach(function(b) {
            b.style.background = 'var(--color-cream)';
            b.style.color = 'var(--color-primary-dark)';
        });
        activeBtn.style.background = 'var(--color-primary)';
        activeBtn.style.color = 'var(--color-white)';
    }

    // Render article cards
    function renderCards(filter) {
        var container = document.getElementById('articleCards');
        container.innerHTML = '';
        BLOG_ARTICLES.forEach(function(article) {
            if (filter !== 'all' && article.category !== filter) return;
            var a = document.createElement('a');
            a.href = 'article.html?slug=' + article.slug;
            a.className = 'article-card';

            a.innerHTML =
                '<div class="article-card-meta">' +
                    '<span class="article-card-category">' + article.category + '</span>' +
                    formatDate(article.date) + ' &middot; ' + article.readTime +
                '</div>' +
                '<h2>' + article.title + '</h2>' +
                '<p>' + article.description + '</p>';

            container.appendChild(a);
        });
    }

    renderCards('all');

    // Render sidebar
    var list = document.getElementById('sidebarArticles');
    BLOG_ARTICLES.forEach(function(article) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = 'article.html?slug=' + article.slug;
        a.textContent = article.title;
        li.appendChild(a);
        list.appendChild(li);
    });

    // Mobile sidebar toggle
    var toggle = document.getElementById('navToggle');
    var sidebar = document.getElementById('blogSidebar');
    var overlay = document.getElementById('sidebarOverlay');

    toggle.addEventListener('click', function() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
    });

    overlay.addEventListener('click', function() {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
    });
})();
</script>

</body>
</html>
