# Alembic config for AI Project Manager backend (SQLite + async).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# The real URL is resolved at runtime from app.config.Settings; this value
# exists only so Alembic CLI commands don't complain when `alembic current`
# is run before any env.py code executes.
sqlalchemy.url = sqlite+aiosqlite:///./ai_pm.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
